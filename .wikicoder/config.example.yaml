# ==========================================================
# WikiCoder Hermes 3.0 - 工业级配置模版 (Example)
# ==========================================================

llm:
  provider: jiutian                # 模型提供商 (jiutian/openai/...)
  model: jiutian-lan-comv3         # 模型名称
  api_key: "YOUR_API_KEY_HERE"     # 您的 API 密钥
  base_url: null                   # 自定义 API 地址 (可选)
  temperature: 0.2                 # 采样温度 (规约类建议 0.2)
  timeout_seconds: 120             # 超时限制

sync:
  auto_on_startup: true            # 是否在系统启动时自动执行增量同步

wiki_strategy:
  # [核心路径]
  vault_path: "C:/path/to/your/knowledge_base"  # 聚合 Wiki 的输出与检索根目录
  raw_dir: "raw"                                # 原始文档存放子目录
  raw_subdirs: ["终端", "运维", "规范"]           # 参与编译的原始文档分类
  
  # [分类映射] 决定原始文件归属哪个 Wiki 类别
  raw_to_wiki_map:
    规范: entities
    运维: concepts
    终端: entities

  # [提炼规则] 影响 Hermes 编译器的语义提取精度
  rules:
    split_mode: "heading"          # 分片模式 (heading/fixed)
    heading_level: 2               # Markdown 标题切割深度
    agent_search_limit: 10         # Agent 多步搜索的单步召回上限
    rag_context_max_chars: 3500    # 注入 AI 上下文的最大字符限制
    
    # 定责特征词（用于辅助 AI 识别业务实体与职责）
    entity_type_hints: ["系统", "设备", "岗位", "角色", "单位"]
    entity_org_suffixes: ["公司", "集团", "部门", "中心", "分公司"]
    entity_content_cues: ["责任主体", "执行主体", "维护对象"]
    
    # 检索加权（提升规约类文档的召回权重）
    rag_core_boost_score: 1000.0
    rag_filename_boost_score: 100.0
    rag_filename_boost_terms: ["规范", "职责", "代维", "分册"]

  # [提示词调优] 全系统指令中枢 (支持多行 YAML 语法)
  prompts:
    knowledge_extraction: |
      你现在是一位资深的通信业务管理专家。请阅读以下原始规约片段，并严格提取其中的知识资产。
      ### 提取维度 ###
      1. 【核心定义 (definitions)】: 提取名词定义、设备参数、系统功能。
      2. 【职责矩阵 (responsibilities)】: 提取 主体、动作、客体、边界条件。
      3. 【维护界面 (interfaces)】: 专门提取“维护分界点”相关描述。
      4. 【逻辑规则 (rules)】: 提取具体的金额、日期、流程顺序、强制性要求。
      ### 约束要求 ###
      - 必须返回纯 JSON 列表，格式: [ {"type": "...", "name": "...", "summary": "...", "subject": "...", "action": "...", "condition": "..."}, ... ]
    
    report_synthesis: |
      你是一位资深的业务审计与规约对齐专家。你的任务是生成一份专业的业务分析报告。
      ### 约束要求 ###
      1. 严禁捏造事实，所有结论必须有据可查。
      2. 保持语言严谨、客观、专业。

  # [专家报告模版]
  report_template: "plan_standard.md"
  synonyms_path: "./data/dictionaries/synonyms_zh.yaml"
  wiki_compile_on_sync: true
  wiki_subdirs: ["entities", "concepts", "comparisons", "queries"]
